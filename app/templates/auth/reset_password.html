{% extends "base.html" %}

{% block title %}Reset Password | NeoApps Portal{% endblock %}

{% block content %}
<section class="panel compact-panel centered-command-page">
    {% if valid %}
    <div class="section-heading">
        <h1>Set New Password</h1>
    </div>
    <form class="operation-form" method="post">
        <label>
            <span>New Password</span>
            <input name="password" type="password" autocomplete="new-password" required>
        </label>
        <label>
            <span>Confirm New Password</span>
            <input name="confirm_password" type="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Update Password</button>
    </form>
    {% else %}
    <div class="section-heading">
        <h1>Link Invalid</h1>
    </div>
    <p class="hero-copy">This reset link is invalid, expired, or already used.</p>
    {% endif %}
</section>
{% endblock %}
