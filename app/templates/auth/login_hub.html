{% extends "base.html" %}

{% set public_landing = true %}

{% block title %}NeoGateway | {{ default_gateway.name }}{% endblock %}

{% block content %}
<section class="motherbrain-command public-command" aria-label="NeoGateway login">
    <section class="motherbrain-core">
        <div class="motherbrain-core-image">
            <img class="gateway-logo" src="{{ url_for('static', filename=default_gateway.logo) }}" alt="{{ default_gateway.name }}" />
        </div>

        <form class="command-login-form" method="post" action="{{ url_for('auth.login') }}">
            <div class="command-login-fields">
                <label for="dashboard-username">Email or Employee ID</label>
                <input id="dashboard-username" name="username" type="text" autocomplete="username" required autofocus>

                <label for="dashboard-password">Password</label>
                <input id="dashboard-password" name="password" type="password" autocomplete="current-password" required>
            </div>

            <button class="command-access-panel command-enter-button" type="submit">
                <strong>ENTER</strong>
            </button>
            <div class="command-link-row">
                <a href="{{ url_for('auth.create_account') }}">Create Account</a>
                <a href="{{ url_for('auth.forgot_password') }}">Forgot Password</a>
            </div>
        </form>
    </section>
</section>
{% endblock %}
