{% extends "base.html" %}

{% set public_landing = true %}
{% block title %}NeoApps{% endblock %}

{% block content %}
<section class="motherbrain-command public-command" aria-label="NeoApps login">
    <section class="motherbrain-core">
        <div class="portal-login-brand">
            <img
                class="portal-brand-logo portal-login-logo"
                src="{{ url_for('static', filename='images/neoapps_logo_transparent.png') }}"
                alt="NeoApps"
                width="1874"
                height="312"
                decoding="async"
            >
        </div>

        <form class="command-login-form" method="post" action="{{ url_for('auth.login') }}">
            <div class="command-login-fields">
                <label for="dashboard-email">Email</label>
                <input id="dashboard-email" name="email" type="email" autocomplete="email" required autofocus>

                <label for="dashboard-password">Password</label>
                <input id="dashboard-password" name="password" type="password" autocomplete="current-password" required>
            </div>

            <button class="command-access-panel command-enter-button" type="submit">
                <strong>ENTER</strong>
            </button>
            <div class="command-link-row">
                <a href="{{ url_for('auth.create_account') }}">Create Account</a>
                <a href="{{ url_for('auth.forgot_password') }}">Forgot Password</a>
            </div>
        </form>
    </section>
</section>
{% endblock %}
