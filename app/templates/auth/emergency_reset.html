{% extends "base.html" %}

{% block title %}Emergency Reset | NeoGateway{% endblock %}

{% block content %}
<section class="panel compact-panel centered-command-page">
    <div class="section-heading">
        <h1>Emergency Password Reset</h1>
        <p class="muted">{{ target_user.display_name }} · {{ target_user.employee_id or target_user.email or "" }}</p>
    </div>
    <form class="operation-form" method="post">
        <label>
            <span>Reason</span>
            <textarea name="reason" required></textarea>
        </label>
        <label>
            <span>Temporary Password</span>
            <input name="password" type="password" autocomplete="new-password" required>
        </label>
        <label>
            <span>Confirm Temporary Password</span>
            <input name="confirm_password" type="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Set Temporary Password</button>
    </form>
</section>
{% endblock %}
