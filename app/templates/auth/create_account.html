{% extends "base.html" %}

{% block title %}Create Account | NeoGateway{% endblock %}

{% block content %}
<section class="panel compact-panel centered-command-page">
    <div class="section-heading">
        <h1>Create Account</h1>
        <p class="muted">New accounts request access to {{ default_gateway.name }} for review.</p>
    </div>

    <form class="operation-form" method="post">
        <label>
            <span>First Name</span>
            <input name="first_name" value="{{ form.first_name }}" autocomplete="given-name" required>
        </label>
        <label>
            <span>Last Name</span>
            <input name="last_name" value="{{ form.last_name }}" autocomplete="family-name" required>
        </label>
        <label>
            <span>Employee ID</span>
            <input name="employee_id" value="{{ form.employee_id }}" required>
        </label>
        <label>
            <span>Supervisor / Manager</span>
            <input name="supervisor_name" value="{{ form.supervisor_name }}" required>
        </label>
        <label>
            <span>Email</span>
            <input name="email" type="email" value="{{ form.email }}" autocomplete="email" required>
        </label>
        <label>
            <span>Work Area</span>
            <input name="work_area" value="{{ form.work_area }}" required>
        </label>
        <label>
            <span>Reason For Access</span>
            <textarea name="access_reason" required>{{ form.access_reason }}</textarea>
        </label>
        <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="new-password" required>
        </label>
        <label>
            <span>Confirm Password</span>
            <input name="confirm_password" type="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Request Access</button>
    </form>

    <div class="action-row">
        <a class="action-button action-button-secondary" href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</section>
{% endblock %}
