{% extends "base.html" %}

{% block title %}Forgot Password | NeoGateway{% endblock %}

{% block content %}
<section class="panel compact-panel centered-command-page">
    <div class="section-heading">
        <h1>Forgot Password</h1>
    </div>

    {% if submitted %}
    <p class="hero-copy">If an account exists for that email, a reset link has been sent.</p>
    {% else %}
    <form class="operation-form" method="post">
        <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required>
        </label>
        <button type="submit">Send Reset Link</button>
    </form>
    {% endif %}

    <div class="action-row">
        <a class="action-button action-button-secondary" href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</section>
{% endblock %}
