{% extends "base.html" %}

{% block title %}User Management | NeoGateway{% endblock %}

{% block content %}
<section class="panel users-panel centered-command-page">
    <div class="section-heading">
        <h1>User Management</h1>
    </div>

    <div class="action-row user-management-choice-grid">
        <a class="action-button user-management-choice" href="{{ url_for('auth.pending_users') }}">
            <span>Pending Requests</span>
        </a>
        <a class="action-button user-management-choice" href="{{ url_for('auth.edit_users') }}">
            <span>Edit Users</span>
        </a>
    </div>

    <div class="action-row">
        <a class="action-button action-button-secondary" href="{{ url_for('neomotherbrain.motherbrain') }}">Back to MotherBrain Home</a>
    </div>
</section>
{% endblock %}
