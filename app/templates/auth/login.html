{% extends "base.html" %}

{% block title %}Login | NeoApps{% endblock %}

{% block content %}
<section class="login-stage">
    <div class="login-identity">
        <div class="motherbrain-sigil" aria-hidden="true">
            <span></span>
        </div>
        <p class="eyebrow">Secure Command Access</p>
        <h1>NeoMotherBrain</h1>
        <p class="hero-copy">
            Authenticate to enter the Rockford Air Hub command layer and bring NeoNodes online.
        </p>
    </div>

    <form class="login-panel" method="post" action="{{ url_for('auth.login') }}">
        <div>
            <p class="eyebrow">Operator Verification</p>
            <h2>Login</h2>
        </div>

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Authorize Access</button>
    </form>
</section>
{% endblock %}
