{% extends "base.html" %}

{% block title %}Generate Operation | NeoApps{% endblock %}

{% block content %}
<section class="panel compact-panel">
    <div class="section-heading">
        <p class="eyebrow">NeoMotherBrain</p>
        <h1>Generate Operation</h1>
        <p class="muted">Uses active MasterFlightSchedule records for {{ form.gateway_code }} matching sort and active day.</p>
    </div>

    <form class="operation-form" method="post">
        <label>
            <span>Sort Date</span>
            <input type="date" name="sort_date" value="{{ form.sort_date }}" required>
        </label>
        <input type="hidden" name="gateway_code" value="{{ form.gateway_code }}">
        <label>
            <span>Sort Name</span>
            <select name="sort_name" required>
                {% for sort_value, sort_label in sort_name_options %}
                <option value="{{ sort_value }}" {% if form.sort_name == sort_value %}selected{% endif %}>{{ sort_label }}</option>
                {% endfor %}
            </select>
        </label>

        <div class="action-row">
            <button class="action-button" type="submit">Generate</button>
            <a class="action-button action-button-secondary" href="{{ url_for('neomotherbrain.operations') }}">Nightly Operations</a>
            <a class="action-button action-button-secondary" href="{{ url_for('neomotherbrain.master_schedule') }}">Master Schedule</a>
        </div>
    </form>
</section>
{% endblock %}
