<script>
(() => {
    const formatMilitaryTime = (value) => {
        const digits = value.replace(/\D/g, "").slice(0, 4);
        if (digits.length <= 2) {
            return digits;
        }
        if (digits.length === 3) {
            return `0${digits.slice(0, 1)}:${digits.slice(1)}`;
        }
        return `${digits.slice(0, 2)}:${digits.slice(2)}`;
    };

    document.addEventListener("input", (event) => {
        const input = event.target.closest(".military-time-input");
        if (!input) {
            return;
        }
        input.value = formatMilitaryTime(input.value);
    });
})();
</script>
