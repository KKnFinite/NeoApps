{% extends "base.html" %}

{% block title %}MotherBrain | NeoApps{% endblock %}

{% block content %}
<section class="motherbrain-landing" aria-label="MotherBrain home">
    <div class="motherbrain-screen-logo" aria-label="MotherBrain logo">
        <img src="{{ url_for('static', filename='images/motherbrain_logo1.png') }}" alt="MotherBrain logo">
    </div>
    <section class="motherbrain-dashboard" aria-labelledby="motherbrain-dashboard-title">
        <h1 id="motherbrain-dashboard-title"><span class="neo-node-name neo-node-motherbrain"><span class="neo-node-prefix">Neo</span><span class="neo-node-suffix">MotherBrain</span></span> DASHBOARD</h1>
        <div class="motherbrain-dashboard-grid">
            <a class="motherbrain-dashboard-card" href="{{ url_for('neomotherbrain.manage_sort') }}">
                <strong>MANAGE SORT</strong>
            </a>
            <a class="motherbrain-dashboard-card" href="{{ url_for('neomotherbrain.master_schedule') }}">
                <strong>MASTER SCHEDULE</strong>
            </a>
            <a class="motherbrain-dashboard-card" href="{{ url_for('neomotherbrain.gateway_matrix') }}">
                <strong>GATEWAY MATRIX</strong>
            </a>
            {% if can_manage_system(current_user) %}
            <a class="motherbrain-dashboard-card" href="{{ url_for('auth.users') }}">
                <strong>USER MANAGEMENT</strong>
            </a>
            <a class="motherbrain-dashboard-card" href="{{ url_for('auth.permission_rules') }}">
                <strong>PERMISSION RULES</strong>
            </a>
            {% endif %}
        </div>
    </section>
</section>
{% endblock %}
