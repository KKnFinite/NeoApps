{% if operation_refresh_status %}
<div
    class="{{ operation_refresh_class|default('node-operation-refresh-paused') }}"
    data-operation-refresh-reload
    data-refresh-active="{{ 'true' if operation_refresh_status.auto_refresh_enabled else 'false' }}"
    data-next-check-seconds="{{ operation_refresh_status.next_check_seconds or '' }}"
    {% if operation_refresh_status.auto_refresh_enabled %}hidden{% endif %}
    aria-live="polite"
>
    {{ operation_refresh_status.message }}
    {% if operation_refresh_status.operation_label and operation_refresh_status.window_label %}
    <span>{{ operation_refresh_status.operation_label }} &middot; {{ operation_refresh_status.window_label }}</span>
    {% endif %}
</div>
<script>
(() => {
    const root = document.currentScript.previousElementSibling;
    if (!root || !root.matches("[data-operation-refresh-reload]")) {
        return;
    }

    const isActive = root.dataset.refreshActive === "true";
    if (isActive) {
        window.setInterval(() => window.location.reload(), 5000);
        return;
    }

    const nextCheckSeconds = Number.parseInt(root.dataset.nextCheckSeconds || "", 10);
    if (Number.isFinite(nextCheckSeconds) && nextCheckSeconds > 0) {
        window.setTimeout(
            () => window.location.reload(),
            Math.min(Math.max(nextCheckSeconds * 1000, 5000), 2147483647)
        );
    }
})();
</script>
{% endif %}
