{% if operation_refresh_status %}
{% set operation_refresh_reload = true %}
{% include "neonodes/_operation_refresh_banner.html" %}
{% if operation_refresh_status.auto_refresh_enabled %}
<script>
(() => {
    const root = document.currentScript.previousElementSibling;
    if (!root || !root.matches("[data-operation-refresh-reload]")) {
        return;
    }

    const isActive = root.dataset.refreshActive === "true";
    if (isActive) {
        window.setInterval(() => window.location.reload(), 5000);
        return;
    }
})();
</script>
{% endif %}
{% endif %}
